<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --gold:#E8A020;--gold-light:#F5B840;--gold-dim:#7a5510;
  --bg:#0c0e13;--surface:#13161d;--surface2:#1a1e27;--surface3:#20252f;
  --border:#252a35;--border-hover:#3a3020;
  --text:#e8e2d6;--text-muted:#7a7468;--text-dim:#4a4840;
}
html,body{margin:0;padding:0;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.app{position:relative;width:100%;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem 1.5rem}
canvas#waves{position:fixed;inset:0;width:100%;height:100%;opacity:.13;pointer-events:none;z-index:0}
#particles{position:fixed;inset:0;pointer-events:none;z-index:0}
.particle{position:absolute;border-radius:50%;pointer-events:none;animation:floatUp linear infinite}
@keyframes floatUp{0%{opacity:0;transform:translateY(0) scale(0)}20%{opacity:.6}80%{opacity:.3}100%{opacity:0;transform:translateY(-100vh) scale(1.5)}}
.screen{position:absolute;width:100%;max-width:600px;padding:0 1rem;flex-direction:column;align-items:center;gap:1.4rem;z-index:1;transition:opacity .35s ease}
.home-eyebrow{font-size:.7rem;font-weight:600;letter-spacing:.18em;color:var(--gold);text-transform:uppercase;display:flex;align-items:center;gap:.6rem}
.home-eyebrow::before,.home-eyebrow::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--gold-dim))}
.home-eyebrow::after{background:linear-gradient(90deg,var(--gold-dim),transparent)}
.mic-wrap{position:relative;width:80px;height:80px}
.mic-ring{position:absolute;border-radius:50%;border:1px solid var(--gold-dim);animation:pulse 2.4s ease-in-out infinite}
.mic-ring:nth-child(1){inset:-8px}
.mic-ring:nth-child(2){inset:-20px;animation-delay:.6s;opacity:.5}
.mic-ring:nth-child(3){inset:-34px;animation-delay:1.2s;opacity:.25}
@keyframes pulse{0%,100%{transform:scale(1);opacity:.6}50%{transform:scale(1.05);opacity:1}}
.mic-core{width:80px;height:80px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#2a2218,#13161d);border:1px solid #3a3020;display:flex;align-items:center;justify-content:center;font-size:2rem;position:relative;z-index:1}
.home-title{font-family:'Cormorant Garamond',serif;font-size:clamp(2.8rem,8vw,4rem);font-weight:700;color:var(--gold);line-height:1.05;text-align:center;letter-spacing:-.5px}
.home-sub{font-size:1rem;color:#a09888;text-align:center}
.home-desc{font-size:.9rem;color:var(--text-muted);line-height:1.75;text-align:center;max-width:400px}
.btn-start{background:var(--gold);color:#0c0e13;border:none;border-radius:100px;padding:1rem 2.4rem;font-size:1rem;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;display:flex;align-items:center;gap:.6rem;transition:all .2s}
.btn-start:hover{background:var(--gold-light);transform:translateY(-2px);box-shadow:0 8px 32px rgba(232,160,32,.3)}
.btn-start:active{transform:translateY(0)}
.btn-arrow{transition:transform .2s}
.btn-start:hover .btn-arrow{transform:translateX(4px)}
.proof{font-size:.75rem;color:var(--text-dim);display:flex;align-items:center;gap:.5rem}
.proof-dot{width:5px;height:5px;border-radius:50%;background:var(--gold);opacity:.5}
.progress-wrap{width:100%;max-width:560px}
.progress-meta{display:flex;justify-content:space-between;margin-bottom:.5rem}
.prog-cat{font-size:.68rem;font-weight:600;letter-spacing:.12em;color:var(--gold);text-transform:uppercase}
.prog-step{font-size:.75rem;color:var(--text-dim)}
.progress-track{height:2px;background:var(--surface3);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#c07010,var(--gold));border-radius:2px;transition:width .5s cubic-bezier(.16,1,.3,1)}
.q-num{font-size:.7rem;font-weight:600;letter-spacing:.1em;color:var(--text-dim);text-transform:uppercase}
.q-text{font-family:'Cormorant Garamond',serif;font-size:clamp(1.5rem,4vw,2rem);font-weight:600;color:#f0ebe0;line-height:1.28;text-align:center;max-width:480px}
.options{display:flex;flex-direction:column;gap:.65rem;width:100%;max-width:520px}
.opt{display:flex;align-items:center;gap:.9rem;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:.95rem 1.25rem;cursor:pointer;transition:all .22s;text-align:left;font-family:'DM Sans',sans-serif;font-size:.9rem;color:#b8b0a4;width:100%}
.opt:hover{border-color:#4a3818;background:var(--surface2);color:var(--text);transform:translateX(4px)}
.opt.selected{border-color:var(--gold);background:#1c1a0e;color:var(--gold);transform:translateX(4px)}
.opt-badge{min-width:26px;height:26px;border-radius:50%;background:var(--surface3);display:flex;align-items:center;justify-content:center;font-size:.62rem;font-weight:700;color:var(--text-dim);transition:all .2s;flex-shrink:0}
.opt:hover .opt-badge,.opt.selected .opt-badge{background:#3a2e10;color:var(--gold)}
.opt-check{margin-left:auto;opacity:0;color:var(--gold);font-size:1.1rem;transition:opacity .2s;flex-shrink:0}
.opt.selected .opt-check{opacity:1}
.result-wrap{width:100%;max-width:520px;max-height:80vh;overflow-y:auto;display:flex;flex-direction:column;gap:1rem;padding-bottom:1rem;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.result-hero{text-align:center;display:flex;flex-direction:column;align-items:center;gap:.5rem;padding:.5rem 0}
.result-badge{display:inline-flex;align-items:center;gap:.4rem;background:rgba(232,160,32,.12);border:1px solid var(--gold-dim);border-radius:100px;padding:.3rem .9rem;font-size:.65rem;font-weight:700;letter-spacing:.14em;color:var(--gold);text-transform:uppercase}
.result-icon-wrap{position:relative;margin:.4rem 0}
.result-icon-glow{position:absolute;inset:-14px;border-radius:50%;background:radial-gradient(circle,rgba(232,160,32,.22),transparent 70%);animation:glow 2s ease-in-out infinite}
@keyframes glow{0%,100%{opacity:.6}50%{opacity:1}}
.result-icon{font-size:2.6rem;position:relative;z-index:1}
.result-title{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:700;color:var(--gold);line-height:1.1}
.result-lead{font-size:.9rem;color:#a09888;line-height:1.75;max-width:420px;margin:0 auto}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.1rem 1.25rem;display:flex;flex-direction:column;gap:.55rem}
.card-label{font-size:.6rem;font-weight:700;letter-spacing:.14em;color:var(--gold);text-transform:uppercase;display:flex;align-items:center;gap:.5rem}
.card-label::after{content:'';flex:1;height:1px;background:var(--border-hover)}
.card-body{font-size:.88rem;color:#9a9288;line-height:1.7}
.score-row{display:flex;flex-direction:column;gap:.35rem}
.score-label{display:flex;justify-content:space-between;font-size:.75rem;color:var(--text-muted)}
.score-track{height:4px;background:var(--surface3);border-radius:4px;overflow:hidden}
.score-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#c07010,var(--gold));transition:width 1.2s cubic-bezier(.16,1,.3,1)}
.quote-block{border-left:2px solid var(--gold);padding:.7rem 1rem;background:rgba(232,160,32,.04);border-radius:0 8px 8px 0}
.quote-block p{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.05rem;color:#c8c0b0;line-height:1.55}
.cta-card{background:linear-gradient(135deg,#1a1a0e,var(--surface));border:1px solid #3a3018;border-radius:12px;padding:1.25rem;display:flex;flex-direction:column;gap:.9rem}
.cta-text{font-size:.88rem;color:#9a9288;line-height:1.7}
.cta-text strong{color:var(--gold)}
.btn-cta{display:flex;align-items:center;justify-content:center;gap:.5rem;background:var(--gold);color:#0c0e13;border:none;border-radius:100px;padding:.85rem 1.8rem;font-size:.95rem;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .2s}
.btn-cta:hover{background:var(--gold-light);transform:translateY(-1px);box-shadow:0 6px 24px rgba(232,160,32,.3)}
.btn-retry{background:none;border:none;color:var(--text-dim);font-size:.78rem;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:.3rem;transition:color .2s;padding:.5rem;margin-top:.25rem;align-self:center}
.btn-retry:hover{color:var(--text-muted)}
@media(max-width:480px){.home-title{font-size:2.4rem}.q-text{font-size:1.4rem}.result-title{font-size:1.7rem}.btn-start{padding:.9rem 1.8rem;font-size:.92rem}.opt{padding:.85rem 1rem;font-size:.85rem}}
</style>
</head>
<body>

<canvas id="waves"></canvas>
<div id="particles"></div>

<div class="app">

  <!-- HOME -->
  <div class="screen" id="s-home" style="display:flex">
    <div class="home-eyebrow">Diagn&#243;stico Vocal</div>
    <div class="mic-wrap">
      <div class="mic-ring"></div>
      <div class="mic-ring"></div>
      <div class="mic-ring"></div>
      <div class="mic-core">&#127908;</div>
    </div>
    <h1 class="home-title">Descubra o que<br>trava a sua voz</h1>
    <p class="home-sub">7 perguntas. Resultado imediato. Zero julgamento.</p>
    <p class="home-desc">Cantores que entendem o pr&#243;prio padr&#227;o vocal evoluem muito mais r&#225;pido. Responda com honestidade &#8212; n&#227;o existe resposta certa ou errada.</p>
    <button class="btn-start" id="btn-start-quiz">
      Come&#231;ar o Diagn&#243;stico
      <svg class="btn-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </button>
    <div class="proof">
      <div class="proof-dot"></div>
      Mais de 2.000 cantores j&#225; fizeram este diagn&#243;stico
    </div>
  </div>

  <!-- QUESTION -->
  <div class="screen" id="s-question" style="display:none;gap:1rem">
    <div class="progress-wrap">
      <div class="progress-meta">
        <span class="prog-cat" id="q-cat"></span>
        <span class="prog-step" id="q-step"></span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="prog-fill" style="width:0%"></div>
      </div>
    </div>
    <span class="q-num" id="q-num"></span>
    <p class="q-text" id="q-text"></p>
    <div class="options" id="options"></div>
  </div>

  <!-- RESULT -->
  <div class="screen" id="s-result" style="display:none">
    <div class="result-wrap" id="result-content"></div>
  </div>

</div>

<script>
const Qs = [
  {cat:"Percepção de Esforço Vocal",text:"Quando você canta notas agudas, sente que precisa fazer força no pescoço ou na garganta?",opts:["Sim — parece que tudo trava","Às vezes, depende da música","Não, sai com naturalidade"],scores:[2,1,0]},
  {cat:"Percepção de Esforço Vocal",text:"Depois de cantar por um tempo, você costuma ficar rouco(a), com dor ou muito cansado(a)?",opts:["Sim, com frequência","Às vezes","Raramente ou nunca"],scores:[2,1,0]},
  {cat:"Percepção de Esforço Vocal",text:"Para alcançar notas mais altas, você sente que precisa \"empurrar\" ou \"gritar\" a voz?",opts:["Sim, quase sempre","Às vezes","Não — flui naturalmente"],scores:[2,1,0]},
  {cat:"Origem e Qualidade do Som",text:"Quando você canta, onde sente que sua voz \"nasce\"?",opts:["Na garganta — com peso e esforço","No peito, mas sobe com força","Leve, como se vibrasse no rosto ou na cabeça"],scores:[2,1,0]},
  {cat:"Origem e Qualidade do Som",text:"Ao tentar notas mais altas, sua voz muda de qualidade — quebra, some ou enfraquece?",opts:["Sim, claramente","Às vezes","Não, mantém o mesmo corpo"],scores:[2,1,0]},
  {cat:"Estabilidade e Consciência Técnica",text:"Você sente que tem controle sobre sua voz ou ela \"escapa\" em certos momentos?",opts:["Escapa ou desestabiliza com frequência","Às vezes me pego sem controle","Tenho bastante controle"],scores:[2,1,0]},
  {cat:"Estabilidade e Consciência Técnica",text:"Você consegue identificar quando está usando voz de peito, voz mista ou voz de cabeça?",opts:["Não faço ideia","Já ouvi falar, mas não sei aplicar","Sim, identifico e consigo alternar"],scores:[2,1,0]}
];

const RESULTS = [
  {
    range:[0,5],icon:"&#10024;",title:"Voz com Suporte",badge:"Estágio Avançado",
    lead:"Sua voz já tem boa liberdade e consciência técnica. Você vai além do básico — agora é hora de refinar, expandir extensão e desenvolver recursos expressivos mais sofisticados.",
    oq:"Seu suporte e colocação vocal estão funcionando bem. Você sente a ressonância, tem controle da passagem de registro e não depende de força para alcançar agudos.",
    aprender:"Foco em dinâmicas, vibrato, agilidade vocal e ampliação de extensão. Técnicas avançadas de mistura e expressividade são seus próximos passos.",
    quote:"\"Quem chegou até aqui sabe que técnica não é limitação — é liberdade com consciência.\"",
    cta:"Explorar técnicas avançadas"
  },
  {
    range:[6,10],icon:"&#127754;",title:"Voz em Transição",badge:"Estágio Intermediário",
    lead:"Você já tem alguma consciência vocal, mas ainda enfrenta instabilidades — especialmente na passagem de registro e nos agudos. Está no ponto exato de evolução.",
    oq:"Sua voz oscila entre momentos de fluidez e travamento. A passagem entre registros (do peito para a cabeça) é o ponto mais desafiador. Às vezes funciona, às vezes não.",
    aprender:"Você precisa trabalhar a mistura vocal (voz mista) para suavizar a passagem de registro. Com isso, os agudos ficam mais acessíveis e o cansaço diminui muito.",
    quote:"\"A passagem de registro não é um obstáculo — é um convite para expandir quem você é vocalmente.\"",
    cta:"Trabalhar a transição de registro"
  },
  {
    range:[11,14],icon:"&#128274;",title:"Voz Presa na Garganta",badge:"Estágio Inicial",
    lead:"Sua voz é ancorada na garganta. Ao cantar — especialmente nos agudos — seus músculos do pescoço tensionam demais, criando esforço e limitando seu alcance.",
    oq:"Quando a voz fica presa na garganta, cada nota aguda exige mais força do que deveria. Isso causa rouquidão, cansaço e a sensação de que sua voz tem um teto muito baixo. Mas não é sua voz que tem limite — é a estratégia que você está usando.",
    aprender:"Você precisa aprender a tirar a pressão da garganta e distribuir o som de forma mais equilibrada. Com os exercícios certos, sua voz vai fluir com muito mais facilidade e menos esforço.",
    quote:"\"Isso não significa que você canta mal. Significa que você aprendeu a cantar do jeito errado — e isso tem solução.\"",
    cta:"Conhecer o Start Vocal"
  }
];

var CTA_URL = "https://seusite.com/start-vocal";
var cur = 0;
var scores = [];

function showScreen(id) {
  var ids = ['s-home','s-question','s-result'];
  for (var i = 0; i < ids.length; i++) {
    var el = document.getElementById(ids[i]);
    if (el) {
      if (ids[i] === id) {
        el.style.display = 'flex';
        el.style.opacity = '1';
      } else {
        el.style.display = 'none';
        el.style.opacity = '0';
      }
    }
  }
}

function startQuiz() {
  cur = 0;
  scores = [];
  renderQ();
  showScreen('s-question');
}

function renderQ() {
  var q = Qs[cur];
  document.getElementById('q-cat').textContent = q.cat;
  document.getElementById('q-step').textContent = (cur+1) + ' / ' + Qs.length;
  document.getElementById('q-num').textContent = 'Pergunta ' + (cur+1 < 10 ? '0' : '') + (cur+1);
  document.getElementById('q-text').textContent = q.text;
  document.getElementById('prog-fill').style.width = Math.round((cur/Qs.length)*100) + '%';
  var labels = ['A','B','C'];
  var el = document.getElementById('options');
  el.innerHTML = '';
  for (var i = 0; i < q.opts.length; i++) {
    (function(idx) {
      var b = document.createElement('button');
      b.className = 'opt';
      b.innerHTML = '<span class="opt-badge">'+labels[idx]+'</span>'+q.opts[idx]+'<span class="opt-check">&#10003;</span>';
      b.addEventListener('click', function() { pick(idx, b); });
      el.appendChild(b);
    })(i);
  }
}

function pick(i, btn) {
  var opts = document.querySelectorAll('.opt');
  for (var j = 0; j < opts.length; j++) opts[j].classList.remove('selected');
  btn.classList.add('selected');
  scores[cur] = Qs[cur].scores[i];
  setTimeout(function() {
    cur++;
    if (cur < Qs.length) renderQ();
    else showResult();
  }, 400);
}

function showResult() {
  var total = 0;
  for (var i = 0; i < scores.length; i++) total += scores[i];
  var res = RESULTS[2];
  for (var i = 0; i < RESULTS.length; i++) {
    if (total >= RESULTS[i].range[0] && total <= RESULTS[i].range[1]) { res = RESULTS[i]; break; }
  }
  var cats = [
    {label:"Esfor&#231;o Vocal", s:scores[0]+scores[1]+scores[2], max:6},
    {label:"Qualidade do Som", s:scores[3]+scores[4], max:4},
    {label:"Consci&#234;ncia T&#233;cnica", s:scores[5]+scores[6], max:4}
  ];
  var catsHtml = '';
  for (var i = 0; i < cats.length; i++) {
    var pct = Math.round((cats[i].s/cats[i].max)*100);
    catsHtml += '<div class="score-row"><div class="score-label"><span>'+cats[i].label+'</span><span>'+pct+'%</span></div><div class="score-track"><div class="score-fill" style="width:0%" data-w="'+pct+'%"></div></div></div>';
  }
  document.getElementById('result-content').innerHTML =
    '<div class="result-hero">' +
      '<div class="result-badge">&#127919; '+res.badge+' &middot; Diagn&oacute;stico Vocal</div>' +
      '<div class="result-icon-wrap"><div class="result-icon-glow"></div><div class="result-icon">'+res.icon+'</div></div>' +
      '<h2 class="result-title">'+res.title+'</h2>' +
      '<p class="result-lead">'+res.lead+'</p>' +
    '</div>' +
    '<div class="card"><div class="card-label">Seu perfil por &aacute;rea</div>'+catsHtml+'</div>' +
    '<div class="card"><div class="card-label">O que est&aacute; acontecendo</div><p class="card-body">'+res.oq+'</p></div>' +
    '<div class="card"><div class="card-label">O que voc&ecirc; precisa agora</div><p class="card-body">'+res.aprender+'</p></div>' +
    '<div class="quote-block"><p>'+res.quote+'</p></div>' +
    '<div class="cta-card">' +
      '<p class="cta-text">O curso <strong>Start Vocal</strong> foi criado exatamente para pessoas nesse est&aacute;gio. Ele ensina como tirar a press&atilde;o da garganta, organizar o apoio e cantar com mais leveza &mdash; mesmo que hoje sua voz trave.</p>' +
      '<button class="btn-cta" id="btn-cta-result">'+res.cta+' &#8594;</button>' +
    '</div>' +
    '<button class="btn-retry" id="btn-retry-quiz">&#8592; Refazer o diagn&oacute;stico</button>';

  showScreen('s-result');

  setTimeout(function() {
    var fills = document.querySelectorAll('.score-fill');
    for (var i = 0; i < fills.length; i++) {
      fills[i].style.width = fills[i].getAttribute('data-w');
    }
    var btnCta = document.getElementById('btn-cta-result');
    if (btnCta) btnCta.addEventListener('click', function() { window.open(CTA_URL,'_blank'); });
    var btnRetry = document.getElementById('btn-retry-quiz');
    if (btnRetry) btnRetry.addEventListener('click', function() { resetQuiz(); });
  }, 500);
}

function resetQuiz() {
  cur = 0;
  scores = [];
  renderQ();
  showScreen('s-home');
}

// Listener no document inteiro em modo capture — pega o clique antes do Hotmart
document.addEventListener('click', function(e) {
  var el = e.target;
  // Verifica o elemento clicado e seus pais (caso clique no SVG interno)
  while (el && el !== document) {
    if (el.id === 'btn-start-quiz') {
      e.preventDefault();
      e.stopImmediatePropagation();
      startQuiz();
      return;
    }
    el = el.parentNode;
  }
}, true); // true = capture phase, roda antes de qualquer outro listener

// Garantir que o botão nunca seja bloqueado por elemento sobreposto
var _fix = setInterval(function() {
  var btn = document.getElementById('btn-start-quiz');
  if (btn) {
    btn.style.position = 'relative';
    btn.style.zIndex = '9999';
    btn.style.pointerEvents = 'auto';
    clearInterval(_fix);
  }
}, 50);

// Ondas animadas
var canvas = document.getElementById('waves');
var ctx = canvas.getContext('2d');
var W, H, tick = 0;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);
var waveDefs = [
  {amp:28,freq:.008,speed:.4,y:.42,alpha:.9},
  {amp:18,freq:.012,speed:.6,y:.50,alpha:.6},
  {amp:35,freq:.006,speed:.3,y:.55,alpha:.4},
  {amp:12,freq:.018,speed:.8,y:.38,alpha:.7},
  {amp:22,freq:.009,speed:.5,y:.62,alpha:.5},
  {amp:40,freq:.005,speed:.25,y:.35,alpha:.25},
  {amp:15,freq:.014,speed:.7,y:.68,alpha:.35}
];
function drawWaves() {
  ctx.clearRect(0,0,W,H);
  for (var wi = 0; wi < waveDefs.length; wi++) {
    var w = waveDefs[wi];
    ctx.beginPath();
    for (var x = 0; x <= W; x += 2) {
      var y = H*w.y + Math.sin(x*w.freq+tick*w.speed)*w.amp + Math.sin(x*w.freq*.7+tick*w.speed*.8)*w.amp*.4;
      if (x === 0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    }
    ctx.strokeStyle = 'rgba(232,160,32,'+w.alpha+')';
    ctx.lineWidth = 1;
    ctx.stroke();
  }
  tick += .015;
  requestAnimationFrame(drawWaves);
}
drawWaves();

// Partículas
var pc = document.getElementById('particles');
function mkParticle() {
  var d = document.createElement('div');
  d.className = 'particle';
  var size = Math.random()*3+1, dur = Math.random()*8+6;
  d.style.cssText = 'width:'+size+'px;height:'+size+'px;left:'+Math.random()*100+'%;bottom:'+Math.random()*20+'%;background:rgba(232,160,32,'+(Math.random()*.5+.1)+');animation-duration:'+dur+'s;animation-delay:'+Math.random()*3+'s;';
  pc.appendChild(d);
  setTimeout(function() { if(d.parentNode) d.parentNode.removeChild(d); }, (dur+3)*1000);
}
setInterval(mkParticle, 700);
</script>
